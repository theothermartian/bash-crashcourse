version: '3.8'

services:
  # Pre-builds the Alpine runner image and tags it.
  # Run: docker-compose build
  runner-builder:
    build:
      context: ./runner
    image: bash-crashcourse-runner
    # This service exists only to build+tag the runner image.
    # It is not started by `docker-compose up`.
    profiles: ["build"]

  backend:
    build:
      context: ./backend
    image: bash-crashcourse-backend
    ports:
      - "3000:3000"
    volumes:
      # Mount the Docker socket so the backend can spawn runner containers
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - PORT=3000
      - RUNNER_IMAGE=bash-crashcourse-runner
    restart: unless-stopped
