<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bash Interactive Lab — Nuclear Facility Training</title>

  <!-- xterm.js from CDN -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-web-links@0.9.0/lib/xterm-addon-web-links.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d1117;
      --panel:     #161b22;
      --border:    #30363d;
      --accent:    #00d4ff;
      --success:   #3fb950;
      --error:     #f85149;
      --warn:      #d29922;
      --text:      #e6edf3;
      --muted:     #8b949e;
      --radius:    6px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 14px;
      overflow: hidden;
    }

    /* ── Layout ── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    #header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    #header .logo {
      font-size: 18px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: -0.5px;
    }

    #header .subtitle {
      color: var(--muted);
      font-size: 12px;
    }

    #main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Terminal panel ── */
    #terminal-panel {
      flex: 1 1 60%;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
      min-width: 0;
    }

    #terminal-label {
      padding: 6px 12px;
      font-size: 11px;
      color: var(--muted);
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    #terminal-container {
      flex: 1;
      padding: 8px;
      overflow: hidden;
    }

    /* ── Quiz panel ── */
    #quiz-panel {
      flex: 0 0 38%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--panel);
    }

    #quiz-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }

    /* Progress */
    #progress-bar-wrap {
      height: 3px;
      background: var(--border);
      flex-shrink: 0;
    }
    #progress-bar {
      height: 3px;
      background: var(--accent);
      transition: width 0.4s ease;
      width: 0%;
    }

    .module-label {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }

    .question-counter {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 12px;
    }

    /* Scenario */
    .scenario-box {
      background: #1c2128;
      border-left: 3px solid var(--accent);
      border-radius: 0 var(--radius) var(--radius) 0;
      padding: 10px 12px;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 12px;
      line-height: 1.5;
    }

    /* Question */
    .question-text {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 14px;
      line-height: 1.5;
    }

    /* Collapsible sections */
    .collapsible-header {
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      user-select: none;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 4px;
      padding: 4px 0;
    }
    .collapsible-header:hover { color: var(--text); }
    .collapsible-header .arrow { transition: transform 0.2s; }
    .collapsible-header.open .arrow { transform: rotate(90deg); }

    .collapsible-body {
      display: none;
      margin-bottom: 12px;
    }
    .collapsible-body.open { display: block; }

    .description-text {
      font-size: 13px;
      color: #c9d1d9;
      line-height: 1.6;
    }

    .use-cases {
      list-style: none;
      margin-top: 6px;
    }
    .use-cases li {
      font-size: 12px;
      color: var(--muted);
      padding: 2px 0;
    }
    .use-cases li::before {
      content: '▸ ';
      color: var(--accent);
    }

    /* Hints */
    #hint-section { margin-top: 8px; }

    #hint-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: var(--radius);
      padding: 6px 12px;
      font-size: 12px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    #hint-btn:hover { border-color: var(--warn); color: var(--warn); }
    #hint-btn:disabled { opacity: 0.4; cursor: default; }

    .hint-box {
      background: #1f1a09;
      border: 1px solid #3d2b00;
      border-radius: var(--radius);
      padding: 10px 12px;
      margin-top: 8px;
      font-size: 12px;
      color: #e3b341;
      line-height: 1.5;
    }

    .hint-meta {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 4px;
    }

    /* Result banner */
    #result-banner {
      flex-shrink: 0;
      padding: 10px 16px;
      font-size: 13px;
      font-weight: 600;
      display: none;
      align-items: center;
      gap: 8px;
      border-top: 1px solid var(--border);
    }
    #result-banner.pass {
      display: flex;
      background: #0d2119;
      color: var(--success);
      border-top-color: var(--success);
    }
    #result-banner.fail {
      display: flex;
      background: #1f0d0d;
      color: var(--error);
      border-top-color: var(--error);
    }
    #result-banner.blocked {
      display: flex;
      background: #1f160d;
      color: var(--warn);
      border-top-color: var(--warn);
    }

    /* Skip button */
    #skip-btn {
      margin-top: 16px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: var(--radius);
      padding: 5px 10px;
      font-size: 11px;
      cursor: pointer;
    }
    #skip-btn:hover { color: var(--text); border-color: var(--muted); }

    /* Status / loading */
    #status-overlay {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
      z-index: 100;
    }
    #status-overlay.hidden { display: none; }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .status-msg { color: var(--muted); font-size: 13px; }

    /* Module complete overlay */
    #module-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 50;
    }
    #module-overlay.show { display: flex; }
    .module-card {
      background: var(--panel);
      border: 1px solid var(--accent);
      border-radius: 10px;
      padding: 32px 40px;
      text-align: center;
      max-width: 360px;
    }
    .module-card h2 { color: var(--accent); margin-bottom: 8px; }
    .module-card p  { color: var(--muted); font-size: 13px; margin-bottom: 20px; }
    .module-card button {
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: var(--radius);
      padding: 10px 24px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

<!-- Loading overlay -->
<div id="status-overlay">
  <div class="spinner"></div>
  <div class="status-msg" id="status-msg">Connecting to lab environment...</div>
</div>

<!-- Module complete overlay -->
<div id="module-overlay">
  <div class="module-card">
    <h2>Module Complete ✓</h2>
    <p id="module-complete-text"></p>
    <button onclick="dismissModuleOverlay()">Continue →</button>
  </div>
</div>

<div id="app">
  <div id="header">
    <span class="logo">⚛ Bash Lab</span>
    <span class="subtitle">Nuclear Facility Operator Training</span>
  </div>

  <div id="main">
    <!-- Terminal -->
    <div id="terminal-panel">
      <div id="terminal-label">Terminal — Alpine Linux (isolated)</div>
      <div id="terminal-container"></div>
    </div>

    <!-- Quiz -->
    <div id="quiz-panel">
      <div id="progress-bar-wrap"><div id="progress-bar"></div></div>

      <div id="quiz-scroll">
        <div class="module-label"  id="q-module">—</div>
        <div class="question-counter" id="q-counter"></div>

        <div class="scenario-box" id="q-scenario"></div>
        <div class="question-text" id="q-question"></div>

        <!-- Description -->
        <div class="collapsible-header" id="desc-toggle" onclick="toggleCollapsible('desc')">
          <span class="arrow">▶</span> 📖 Description
        </div>
        <div class="collapsible-body" id="desc-body">
          <div class="description-text" id="q-description"></div>
          <ul class="use-cases" id="q-usecases"></ul>
        </div>

        <!-- Hints -->
        <div id="hint-section">
          <button id="hint-btn" onclick="requestHint()">💡 Hint <span id="hint-count"></span></button>
          <div id="hint-display"></div>
        </div>

        <button id="skip-btn" onclick="skipQuestion()">Skip this question</button>
      </div>

      <div id="result-banner" id="result-banner">
        <span id="result-icon"></span>
        <span id="result-text"></span>
      </div>
    </div>
  </div>
</div>

<script src="terminal.js"></script>
<script src="quiz.js"></script>
</body>
</html>
